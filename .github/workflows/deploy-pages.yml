name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/dp-strategy-classification-y43q9r  # 合併進 main 後可移除此行
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site  # 只發佈產生好的靜態頁面，不含 content/ 原始片段與 build.py
        run: |
          mkdir -p _site
          cp -r site/. _site/
          rm -f _site/build.py
          find _site/topics -mindepth 1 -maxdepth 1 -type d -exec rm -rf {}/content \;
          find _site/topics -maxdepth 2 -name OUTLINE.md -delete

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true  # 首次執行時自動啟用 GitHub Pages（來源設為 Actions）

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
