name: Deploy greedy guide to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/greedy-algorithm-guide-36aywl  # 合併進 main 後可移除此行
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true  # 首次執行時自動啟用 GitHub Pages（來源設為 Actions）

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: greedy-guide

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
