name: Deploy guides to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/dp-strategy-classification-y43q9r  # 合併進 main 後可移除此行
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site  # 貪心指南在根目錄（維持既有網址），DP 上分攻略在 /dp/
        run: |
          mkdir -p _site
          cp -r greedy-guide/. _site/
          mkdir -p _site/dp
          cp -r dp-guide/. _site/dp/
          rm -rf _site/content _site/build.py _site/OUTLINE.md
          rm -rf _site/dp/content _site/dp/build.py _site/dp/OUTLINE.md

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true  # 首次執行時自動啟用 GitHub Pages（來源設為 Actions）

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
